<!DOCTYPE html>
<html lang="en">
<head>
    <title>Appointment</title>
</head>
<body>
    <h2 align="center">Welcome to Savi Hospital</h2>
    <hr>
    <p align="center">To book an appointment, please enter the necessary details below.</p>
    <hr>

    <form align="center" action="BookedApp.html">
        <label for="name">Patient Name:</label>
        <input type="text" id="name" placeholder="Enter patient name"><br><br>
        
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="Enter email address"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" min="0"><br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br><br>

        <label for="doctor">Choose a Doctor:</label>
        <select id="doctor">
            <option>Dr. Rushikesh</option>
            <option>Dr. Prathamesh</option>
            <option>Dr. Adhar</option>
            <option>Dr. Tushar</option>
        </select><br><br>

        <label for="date">Select Appointment Date:</label>
        <input type="date" id="date"><br><br>

        <label for="time">Select Appointment Time:</label>
        <input type="time" id="time"><br><br>

        <label for="problems">Health Issues:</label><br>
        <textarea id="problems" name="problems" cols="30" rows="5"></textarea><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
