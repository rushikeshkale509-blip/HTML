<!DOCTYPE html>
<html>
    <head>
        <title>Job Application Form</title>
    </head>
    <Body>

        <h2 align="center"><strong>BT Software Company</strong></h2>
        <hr>
        <hr>
        <h4 align="center">Fill following details for Job Application Form.</h4>
        <hr><br>
        <form action="#" align="center">
            <label for="name" >Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required><br><br>

            <label for="gmail" >Email:</label>
            <input type="email" id="gmail" placeholder="Enter email" required><br><br>

            <label for="MoboleNo" >Phone No.:</label>
            <input type="tel" id="MobilNo" name="phone" required><br><br>

            <label for="position">Position Applying For:</label>
            <select id="position" name="position" required>
                <option value="">--Select Position--</option>
                <option>Software Engineer</option>
                <option>Frontend Developer</option>
                <option>Backend Developer</option>
                <option>Full Stack Developer</option>
                <option>QA Engineer</option>
            </select><br><br>

            <label for="experience">Experience Level:</label>
            <select id="experience" name="experience" required>
                <option value="">--Select Experience--</option>
                <option>Fresher</option>
                <option>1-2 Years</option>
                <option>3-5 Years</option>
                <option>5+ Years</option>
            </select><br><br>

            <label>Technical Sills:</label><br>
            <input type="checkbox" name="skill" value="Java">Java <br>
            <input type="checkbox" name="skill" value="Python">Pyhon <br>
            <input type="checkbox" name="skill" value="HTML">Html <br>
            <input type="checkbox" name="skill" value="PHP">PHP <br>
            <input type="checkbox" name="skill" value="CSS">CSS <br><br>

            <label>Portfolio Website URL:</label>
            <input type="url" id="Portfolio" name="Portfoli" placeholder="//https:yourportfolio.com" required><br><br>

            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required><br><br>
            
            <label for="coverletter">Cover Letter:</label><br>
            <textarea id="coverletter" name="coverletter" rows="6" cols="50" placeholder="Write your cover letter here..." required></textarea><br><br>

            <input type="submit" value="Submit Application">
            <input type="reset" value="Reset Form">


        </form>
    </Body>
</html>
